name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  # ── .NET Format Check ─────────────────────────────────────
  dotnet-format:
    name: .NET Format & Analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore WorldFaith.sln

      - name: Format check
        run: dotnet format WorldFaith.sln --verify-no-changes --severity warn
        continue-on-error: true

      - name: Build (warnings as errors in CI)
        run: dotnet build WorldFaith.sln -c Release --no-restore /p:TreatWarningsAsErrors=false

  # ── Security Scan ─────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'        # Không fail build, chỉ báo cáo
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true

  # ── Admin Panel Type Check ────────────────────────────────
  typescript:
    name: TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install
        working-directory: admin-panel
        run: npm ci

      - name: Type check
        working-directory: admin-panel
        run: npx tsc --noEmit
        continue-on-error: true

  # ── PR Summary ────────────────────────────────────────────
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [dotnet-format, security, typescript]

    steps:
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              'dotnet-format': '${{ needs.dotnet-format.result }}',
              'security':      '${{ needs.security.result }}',
              'typescript':    '${{ needs.typescript.result }}',
            }
            const icon = r => r === 'success' ? '✅' : r === 'failure' ? '❌' : '⚠️'
            const body = [
              '## PR Check Results',
              '',
              `| Check | Status |`,
              `|-------|--------|`,
              ...Object.entries(jobs).map(([k, v]) => `| ${k} | ${icon(v)} ${v} |`),
              '',
              `_Updated: ${new Date().toISOString()}_`
            ].join('\n')

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            })
