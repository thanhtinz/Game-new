name: WorldFaith Admin Panel CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'admin-panel/**'
      - '.github/workflows/admin.yml'
  pull_request:
    branches: [main]
    paths:
      - 'admin-panel/**'

jobs:
  # ── Build & Lint ──────────────────────────────────────────
  build:
    name: Build Admin Panel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install dependencies
        working-directory: admin-panel
        run: npm ci

      - name: Build
        working-directory: admin-panel
        env:
          NEXT_PUBLIC_API_URL: https://api.worldfaith.game
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: admin-panel-build
          path: admin-panel/.next
          retention-days: 7

  # ── Deploy ────────────────────────────────────────────────
  deploy:
    name: Deploy Admin Panel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install & Build
        working-directory: admin-panel
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.ADMIN_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Deploy via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "admin-panel/.next,admin-panel/package.json,admin-panel/next.config.js"
          target: /opt/worldfaith/admin-panel
          strip_components: 1

      - name: Restart Admin Panel
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/worldfaith/admin-panel
            npm ci --production
            pm2 restart worldfaith-admin || pm2 start npm --name worldfaith-admin -- start
            echo "✅ Admin panel deployed: $(date)"
